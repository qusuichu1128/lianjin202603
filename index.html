<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        /* 全局样式重置和基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* 页面背景渐变 */
        body {
            background: linear-gradient(90deg, #4facfe 0%, #7f53ac 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        /* 标题样式 */
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 核心容器：包含输入框和todo列表 */
        .todo-container {
            width: 100%;
            max-width: 600px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 2rem;
            /* 自动适配高度（核心） */
            min-height: 150px;
            height: auto;
        }

        /* 输入区域容器 */
        .input-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            width: 100%;
        }

        /* 输入框样式 */
        #todo-input {
            flex: 1;
            padding: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #todo-input:focus {
            border-color: #4facfe;
        }

        /* 添加按钮样式 */
        #add-btn {
            padding: 0 1.5rem;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        #add-btn:hover {
            background-color: #27ae60;
        }

        /* Todo列表容器 */
        #todo-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* 单个Todo项样式 */
        .todo-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        /* 复选框样式 */
        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Todo文本样式 */
        .todo-text {
            flex: 1;
            font-size: 1rem;
            transition: text-decoration 0.3s, color 0.3s;
        }

        /* 已完成的Todo文本样式 */
        .todo-text.completed {
            text-decoration: line-through;
            color: #888;
        }

        /* 删除按钮样式 */
        .delete-btn {
            padding: 0.5rem 1rem;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .delete-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <!-- 页面标题 -->
    <h1>Todo App</h1>

    <!-- 核心白色容器：包含输入框和todo列表 -->
    <div class="todo-container">
        <!-- 输入区域 -->
        <div class="input-container">
            <input type="text" id="todo-input" placeholder="请输入待办事项...">
            <button id="add-btn">添加</button>
        </div>

        <!-- Todo列表区域 -->
        <div id="todo-list"></div>
    </div>

    <script>
        // 获取DOM元素
        const todoInput = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');

        // 添加Todo项的函数
        function addTodo() {
            // 获取输入框内容并去除首尾空格
            const todoText = todoInput.value.trim();
            
            // 验证输入内容是否为空
            if (!todoText) {
                alert('请输入待办事项内容！');
                return;
            }

            // 创建Todo项容器
            const todoItem = document.createElement('div');
            todoItem.className = 'todo-item';

            // 创建复选框
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'todo-checkbox';

            // 创建文本元素
            const textElement = document.createElement('span');
            textElement.className = 'todo-text';
            textElement.textContent = todoText;

            // 创建删除按钮
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.textContent = '删除';

            // 复选框点击事件：切换完成状态
            checkbox.addEventListener('click', () => {
                textElement.classList.toggle('completed');
            });

            // 删除按钮点击事件：移除当前Todo项
            deleteBtn.addEventListener('click', () => {
                todoItem.remove();
            });

            // 组装Todo项
            todoItem.appendChild(checkbox);
            todoItem.appendChild(textElement);
            todoItem.appendChild(deleteBtn);

            // 添加到列表中
            todoList.appendChild(todoItem);

            // 清空输入框并聚焦
            todoInput.value = '';
            todoInput.focus();
        }

        // 添加按钮点击事件
        addBtn.addEventListener('click', addTodo);

        // 输入框回车事件（按下Enter键也能添加）
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTodo();
            }
        });
    </script>
</body>
</html>
